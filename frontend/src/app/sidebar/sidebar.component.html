<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo-icon">
      <pt-svg [icon]="SvgIcon.Logo" [size]="24" />
    </div>
    <h1 class="logo-text">FocusTrail</h1>
  </div>

  <nav class="sidebar-nav">
    <pt-nav-button label="Dashboard" [tab]="ActiveTab.Dashboard" (clicked)="setDashboardTab()">
      <pt-svg [icon]="SvgIcon.Dashboard" [size]="20" />
    </pt-nav-button>

    <pt-nav-button label="Tasks" [tab]="ActiveTab.Tasks" (clicked)="setTasksTab()">
      <pt-svg [icon]="SvgIcon.Tasks" [size]="20" />
    </pt-nav-button>

    <pt-nav-button label="Goals" [tab]="ActiveTab.Goals" (clicked)="setGoalsTab()">
      <pt-svg [icon]="SvgIcon.Goals" [size]="20" />
    </pt-nav-button>

    <pt-nav-button label="Habits" [tab]="ActiveTab.Habits" (clicked)="setHabitsTab()">
      <pt-svg [icon]="SvgIcon.Habits" [size]="20" />
    </pt-nav-button>
  </nav>

  <div class="sidebar-footer">
    <button class="theme-toggle" (click)="toggleTheme()" [title]="'Switch Theme'">
      @if (currentTheme() === Theme.Light) {
        <pt-svg [icon]="SvgIcon.Moon" [size]="18" />
        <span class="toggle-label">Go Dark</span>
      } @else {
        <pt-svg [icon]="SvgIcon.Sun" [size]="18" />
        <span class="toggle-label">Light Up</span>
      }
    </button>
  </div>

</aside>
