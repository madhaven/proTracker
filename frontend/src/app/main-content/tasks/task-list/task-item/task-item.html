<div class="task-item group" [class.danger-item]="isOverdue()">
  <button (click)="toggleTask(task().id)" 
          class="checkbox-box" 
          [class.danger-checkbox]="isOverdue()"
          [class.checked]="isCompleted()">
    @if (isCompleted()) {
      <svg class="check-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
      </svg>
    }
  </button>
  
  <div class="task-info">
    <p class="task-title" 
       [class.danger-title]="isOverdue()" 
       [class.line-through]="isCompleted()">
      {{ task().title }}
    </p>
    
    @if (isOverdue()) {
      <p class="task-meta danger-meta">Due: {{ task().date | date:'mediumDate' }}</p>
    }
    
    @if (task().goalId) {
      <p class="task-meta">{{ getGoalName(task().goalId!) }}</p>
    }
  </div>
  
  <button (click)="deleteTask(task().id)" 
          class="delete-btn" 
          [class.danger-delete]="isOverdue()">
    &times;
  </button>
</div>
