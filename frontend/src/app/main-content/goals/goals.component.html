<div class="animate-in">
  <!-- Add Goal Form -->
  <div class="goal-form-container">
    <form [formGroup]="goalForm" (ngSubmit)="addGoal()" class="goal-form">
      <input type="text" formControlName="title" placeholder="New Goal Title" 
        class="goal-title-input">
      <div class="goal-form-row">
        <input type="date" formControlName="targetDate"
          class="goal-date-input">
        <button type="submit" [disabled]="goalForm.invalid" class="btn-create">
          Create
        </button>
      </div>
    </form>
  </div>

  <!-- Goals List -->
  <div class="goals-container">
    @for (goal of goals(); track goal.id) {
      @let stats = getGoalStats(goal.id);
      <div class="goal-item group">
        <button (click)="deleteGoal(goal.id)" class="delete-btn-absolute">
          &times;
        </button>
        <div class="goal-content">
          <div class="goal-info">
            <h3 class="goal-item-title">{{ goal.title }}</h3>
            <div class="goal-meta">
              <span>Target: {{ goal.targetDate | date:'mediumDate' }}</span>
              <span class="dot">&middot;</span>
              <span>{{ stats.completed }}/{{ stats.total }} tasks</span>
            </div>
          </div>
          
          <div class="goal-progress-container">
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" [style.width.%]="stats.percentage"></div>
            </div>
            <span class="percentage-text">{{ stats.percentage }}%</span>
          </div>
        </div>
      </div>
    }
    @if (goals().length === 0) {
      <p class="empty-text">No large objectives set.</p>
    }
  </div>
</div>
