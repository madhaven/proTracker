<div class="animate-in">
  <div class="dashboard-grid">
    <!-- Tasks -->
    <section class="dashboard-section tasks-section">
      <pt-task-list [showCompleted]="false" [showStats]="false" />
    </section>

    <!-- Goal Progress Snapshot -->
    <section class="dashboard-section">
      <h2 class="section-title">Goals</h2>
      <div class="goals-progress-list">
        @for (goal of goals(); track goal.id) {
          @let stats = getGoalStats(goal.id);
          <div class="goal-progress-item group" (click)="setGoalsTab()">
            <div class="goal-header">
              <h4 class="goal-title">{{ goal.title }}</h4>
              <span class="goal-percentage">{{ stats.percentage }}%</span>
            </div>
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" [style.width.%]="stats.percentage"></div>
            </div>
          </div>
        }
      </div>
    </section>
  </div>
</div>
